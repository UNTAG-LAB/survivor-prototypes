<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survivor Prototypes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    background: #0f0e17;
    color: #fffffe;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #B2DFDB, #7f5af0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #94a1b2;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 480px;
  }
  .card {
    background: #1a1932;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px 24px;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .card-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .card-desc {
    color: #94a1b2;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    letter-spacing: 1px;
  }
  .card-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .card.catharsis::before { background: linear-gradient(90deg, #B2DFDB, #99e871); }
  .card.catharsis .card-tag { background: rgba(178,223,219,0.15); color: #B2DFDB; }

  .card.bottle::before { background: linear-gradient(90deg, #FFD700, #4A7FB5); }
  .card.bottle .card-tag { background: rgba(255,215,0,0.15); color: #FFD700; }

  .card.quadrant::before { background: linear-gradient(90deg, #7f5af0, #e07aff); }
  .card.quadrant .card-tag { background: rgba(127,90,240,0.15); color: #a78bfa; }

  footer {
    margin-top: 60px;
    color: #4a4a6a;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <h1>SURVIVOR PROTOTYPES</h1>
  <div class="subtitle">互動原型預覽</div>
  <div class="cards">
    <a class="card catharsis" href="catharsis-mode.html">
      <div class="card-icon">👊</div>
      <div class="card-title">煩惱清除戰</div>
      <div class="card-desc">選一個煩惱，看著它變成怪物，然後碾碎它。戰鬥不改，用儀式包裝把每一刀變得有意義。</div>
      <span class="card-tag">紓壓系統 · Catharsis Mode</span>
    </a>
    <a class="card bottle" href="emotion-bottle.html">
      <div class="card-icon">🫙</div>
      <div class="card-title">情緒瓶</div>
      <div class="card-desc">每天選一個天氣、寫一句話、拿到一顆球。裝進瓶子記住，或投進火裡放下。</div>
      <span class="card-tag">篝火系統 · Emotion Bottle</span>
    </a>
    <a class="card quadrant" href="emotion-quadrant.html">
      <div class="card-icon">🧭</div>
      <div class="card-title">情緒四象限</div>
      <div class="card-desc">用滑動選擇今天的情緒座標，在四象限上找到屬於你的位置。</div>
      <span class="card-tag">情緒系統 · Emotion Quadrant</span>
    </a>
  </div>
  <footer>UNTAG LAB · Survivor</footer>
</body>
</html>
