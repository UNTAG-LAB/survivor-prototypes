<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>煩惱清除戰 Demo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0a0a14;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #app {
    width: 390px; height: 844px;
    position: relative;
    overflow: hidden;
    background: #111118;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  @media (max-width: 420px) {
    #app { width: 100vw; height: 100vh; border-radius: 0; }
  }

  /* ===== HUD ===== */
  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 30;
    padding: 14px 16px 10px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  }
  .hud-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .hud-level {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 6px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }
  .hud-coins {
    color: #ffd740;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .hud-hp-bar {
    width: 100%; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .hud-hp-fill {
    height: 100%; width: 72%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    border-radius: 5px;
    box-shadow: 0 0 6px rgba(76,175,80,0.4);
  }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
  }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* ===== MODE SELECT ===== */
  .mode-screen {
    background: linear-gradient(180deg, #16161e 0%, #1a1a28 50%, #12121a 100%);
    padding-top: 70px;
    align-items: stretch;
  }
  .mode-title {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .mode-list {
    flex: 1;
    padding: 0 20px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .mode-card {
    position: relative;
    display: flex; align-items: center;
    padding: 18px 16px;
    border-radius: 16px;
    border: 1.5px solid rgba(255,255,255,0.06);
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    transition: all 0.3s;
  }
  .mode-card.disabled { opacity: 0.4; }
  .mode-card .mc-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .mode-card .mc-info { flex: 1; }
  .mode-card .mc-name {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    margin-bottom: 3px;
  }
  .mode-card .mc-desc {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .mode-card .mc-arrow {
    color: rgba(255,255,255,0.2);
    font-size: 20px;
    margin-left: 8px;
  }
  .mode-card .mc-badge {
    position: absolute;
    top: -6px; right: 12px;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .mode-card.card-adventure .mc-icon {
    background: linear-gradient(135deg, #3a3a4a, #2a2a38);
  }
  .mode-card.card-daily .mc-icon {
    background: linear-gradient(135deg, #3a3540, #2a2530);
  }
  .mode-card.card-catharsis {
    background: linear-gradient(135deg, rgba(178,223,219,0.1) 0%, rgba(178,223,219,0.04) 100%);
    border-color: rgba(178,223,219,0.35);
    cursor: pointer;
    animation: cardBreath 2.5s ease-in-out infinite;
  }
  .mode-card.card-catharsis:active { transform: scale(0.97); }
  .mode-card.card-catharsis .mc-icon {
    background: linear-gradient(135deg, #4db6ac, #26a69a);
    box-shadow: 0 0 12px rgba(178,223,219,0.3);
  }
  .mode-card.card-catharsis .mc-name { color: #B2DFDB; }
  .mode-card.card-catharsis .mc-arrow { color: rgba(178,223,219,0.5); }
  @keyframes cardBreath {
    0%, 100% { border-color: rgba(178,223,219,0.25); box-shadow: 0 0 0 rgba(178,223,219,0); }
    50% { border-color: rgba(178,223,219,0.5); box-shadow: 0 0 20px rgba(178,223,219,0.08); }
  }

  /* ===== TAG SELECT ===== */
  .tag-screen {
    background: linear-gradient(180deg, rgba(18,18,26,0.98) 0%, rgba(20,24,28,0.98) 100%);
    align-items: center;
    justify-content: center;
    z-index: 11;
  }
  .greeting {
    color: rgba(255,255,255,0.9);
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    text-shadow: 0 2px 15px rgba(0,0,0,0.8);
    margin-bottom: 32px;
    animation: fadeSlideIn 0.5s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tag-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 28px;
    width: 100%;
    animation: fadeSlideIn 0.7s ease;
  }
  .tag-btn {
    background: rgba(178, 223, 219, 0.1);
    border: 1.5px solid rgba(178, 223, 219, 0.2);
    border-radius: 14px;
    padding: 16px 6px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .tag-btn:hover {
    background: rgba(178, 223, 219, 0.22);
    border-color: rgba(178, 223, 219, 0.45);
    transform: translateY(-2px);
  }
  .tag-btn:active { transform: scale(0.93); }
  .tag-whatever-wrap {
    padding: 0 28px;
    width: 100%;
    margin-top: 16px;
    animation: fadeSlideIn 0.9s ease;
  }
  .tag-whatever {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px dashed rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tag-whatever:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.75);
  }
  .tag-whatever:active { transform: scale(0.96); }
  .tag-whatever-hint {
    text-align: center;
    color: rgba(255,255,255,0.22);
    font-size: 12px;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .tag-back {
    position: absolute;
    top: 20px; left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    cursor: pointer;
    z-index: 12;
    padding: 6px 10px;
    border-radius: 8px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .tag-back:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

  /* ===== TRANSITION ===== */
  .transition-screen {
    background: rgba(0,0,0,0.92);
    align-items: center; justify-content: center;
    z-index: 15;
  }
  .transition-tag {
    color: #B2DFDB;
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 8px;
    text-shadow: 0 0 30px rgba(178,223,219,0.5);
    animation: tagGrow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes tagGrow {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .transition-sub {
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    letter-spacing: 3px;
    margin-top: 12px;
    animation: fadeSlideIn 0.5s 0.3s ease both;
  }
  .flash-white {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: white; opacity: 0;
    z-index: 16; pointer-events: none;
  }
  .flash-white.active { animation: flashPop 0.3s ease; }
  @keyframes flashPop {
    0% { opacity: 0; } 30% { opacity: 0.9; } 100% { opacity: 0; }
  }

  /* ===== BATTLE ===== */
  .battle-screen {
    z-index: 11;
    background: #0d1a0d;
    overflow: hidden;
  }
  .battle-ground {
    position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      linear-gradient(180deg, #0d1a0d 0%, #142014 50%, #0d1a0d 100%);
  }
  .battle-vignette {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none; z-index: 1;
  }
  .battle-hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 5;
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    display: flex; justify-content: space-between; align-items: center;
  }
  .battle-timer {
    color: #fff; font-size: 18px; font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.5);
  }
  .battle-kills {
    color: #B2DFDB; font-size: 13px; font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }
  .skill-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 10px 16px 20px;
    background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    display: flex; justify-content: center; gap: 10px;
  }
  .skill-icon {
    width: 48px; height: 48px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1.5px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; position: relative;
  }
  .skill-icon .skill-cd {
    position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: rgba(255,255,255,0.4);
  }
  .battle-flash {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: white; opacity: 0; pointer-events: none; z-index: 6;
  }
  .battle-flash.pop { animation: flashPop 0.15s ease; }

  /* ===== ENTITIES ===== */
  .player {
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #64b5f6, #42a5f5);
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 0 12px rgba(100,181,246,0.4), 0 2px 6px rgba(0,0,0,0.4);
    z-index: 3;
  }
  .player::after {
    content: '';
    position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
    border-radius: 50%;
    border: 1px solid rgba(100,181,246,0.3);
    animation: playerPulse 1.5s ease-in-out infinite;
  }
  @keyframes playerPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 0; }
  }
  .projectile {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle, #B2DFDB, #80cbc4);
    box-shadow: 0 0 8px rgba(178,223,219,0.7), 0 0 16px rgba(178,223,219,0.3);
    z-index: 2; pointer-events: none;
  }
  .aoe-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(178,223,219,0.6);
    background: radial-gradient(circle, rgba(178,223,219,0.15) 0%, transparent 70%);
    z-index: 2; pointer-events: none;
    animation: aoeExpand 0.5s ease-out forwards;
  }
  @keyframes aoeExpand {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }
  .mob-small {
    position: absolute;
    width: 16px; height: 16px;
    background: #d32f2f;
    border-radius: 3px;
    box-shadow: 0 0 6px rgba(211,47,47,0.4);
    z-index: 2;
  }
  .mob-small.dying { animation: mobDie 0.2s ease-out forwards; }
  @keyframes mobDie {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }
  .mob-elite {
    position: absolute;
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #e53935, #c62828);
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 15px rgba(211,47,47,0.4), 0 4px 8px rgba(0,0,0,0.3);
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .mob-elite.hit { animation: eliteHit 0.2s ease; }
  @keyframes eliteHit {
    0% { filter: brightness(2.5); transform: scale(0.9); }
    100% { filter: brightness(1); transform: scale(1); }
  }
  .mob-elite.dying { animation: eliteDie 0.4s ease forwards; }
  @keyframes eliteDie {
    0% { transform: scale(1); opacity: 1; filter: brightness(1); }
    30% { transform: scale(1.2); filter: brightness(3); }
    100% { transform: scale(0); opacity: 0; }
  }
  .elite-hp {
    position: absolute;
    top: -8px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 4px;
    background: rgba(0,0,0,0.5);
    border-radius: 2px; overflow: hidden;
    pointer-events: none;
  }
  .elite-hp-fill {
    height: 100%; background: #f44336;
    border-radius: 2px; transition: width 0.2s;
  }
  .worry-bubble {
    position: absolute;
    top: -28px; left: 50%; transform: translateX(-50%);
    background: rgba(178, 223, 219, 0.88);
    color: #1a2a28;
    font-size: 13px; font-weight: 700;
    padding: 4px 10px; border-radius: 8px;
    white-space: nowrap; pointer-events: none; z-index: 4;
  }
  .worry-bubble::after {
    content: '';
    position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 4px solid rgba(178, 223, 219, 0.88);
  }
  .taunt-bubble {
    position: absolute;
    top: -52px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    color: #333; font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 10px;
    white-space: nowrap; pointer-events: none; z-index: 5;
    animation: tauntIn 0.3s ease, tauntOut 0.4s 1.6s ease forwards;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  @keyframes tauntIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } }
  @keyframes tauntOut { to { opacity: 0; transform: translateX(-50%) translateY(-6px); } }
  .xp-gem {
    position: absolute;
    width: 8px; height: 8px;
    background: #69f0ae;
    transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(105,240,174,0.5);
    z-index: 2; pointer-events: none;
  }
  .shatter-piece {
    position: absolute;
    color: #B2DFDB; font-size: 20px; font-weight: 700;
    pointer-events: none; z-index: 8;
    text-shadow: 0 0 10px rgba(178,223,219,0.5);
  }
  .shatter-piece.fly { animation: shatterFly 0.6s ease-out forwards; }
  @keyframes shatterFly {
    0% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.3); }
  }
  .color-restore {
    position: absolute; border-radius: 50%;
    pointer-events: none; z-index: 4;
    animation: colorPulse 0.8s ease-out forwards;
  }
  @keyframes colorPulse {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0.6;
         background: radial-gradient(circle, rgba(178,223,219,0.3) 0%, transparent 70%); }
    60% { opacity: 0.3; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0;
           background: radial-gradient(circle, rgba(178,223,219,0.1) 0%, transparent 70%); }
  }
  .kill-text {
    position: absolute;
    color: #B2DFDB; font-size: 18px; font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(178,223,219,0.5), 0 1px 3px rgba(0,0,0,0.8);
    z-index: 8; pointer-events: none;
    animation: killTextUp 1s ease-out forwards;
  }
  @keyframes killTextUp {
    0% { opacity: 1; transform: translate(-50%, 0) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -40px) scale(0.8); }
  }

  /* ===== SETTLEMENT ===== */
  .settle-screen {
    background: linear-gradient(180deg, rgba(12,12,20,0.96) 0%, rgba(18,24,22,0.96) 100%);
    align-items: center; justify-content: center;
    z-index: 20;
  }
  .settle-title {
    font-size: 36px; font-weight: 700; color: #fff;
    letter-spacing: 5px;
    text-shadow: 0 0 20px rgba(178,223,219,0.3), 0 3px 6px rgba(0,0,0,0.6);
    margin-bottom: 20px;
    animation: settleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes settleIn { from { transform: scale(0); opacity: 0; } }
  .settle-stats {
    color: rgba(255,255,255,0.6); font-size: 14px;
    letter-spacing: 2px; margin-bottom: 32px;
    text-align: center; line-height: 1.8;
  }
  .settle-quote {
    color: rgba(255,255,255,0.8); font-size: 19px;
    letter-spacing: 2px; text-align: center;
    padding: 0 36px; line-height: 1.6;
    margin-bottom: 10px;
    animation: quoteFade 0.8s 0.5s ease both;
  }
  @keyframes quoteFade { from { opacity: 0; transform: translateY(10px); } }
  .settle-reward {
    color: rgba(255,255,255,0.4); font-size: 13px;
    margin-bottom: 44px;
    animation: quoteFade 0.8s 0.8s ease both;
  }
  .settle-btns {
    display: flex; gap: 14px;
    padding: 0 36px; width: 100%;
    animation: quoteFade 0.8s 1s ease both;
  }
  .settle-btn {
    flex: 1; padding: 15px;
    border-radius: 14px; border: none;
    font-size: 15px; font-weight: 600;
    letter-spacing: 2px; cursor: pointer;
    transition: all 0.2s;
  }
  .settle-btn:active { transform: scale(0.95); }
  .settle-btn.secondary {
    background: linear-gradient(135deg, #9e9e9e, #757575); color: #fff;
  }
  .settle-btn.primary {
    background: linear-gradient(135deg, #66bb6a, #4caf50); color: #fff;
    box-shadow: 0 4px 12px rgba(76,175,80,0.3);
  }

  /* ===== INTRO ===== */
  .intro-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; cursor: pointer;
    transition: opacity 0.5s;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-title {
    color: rgba(255,255,255,0.9); font-size: 26px; font-weight: 700;
    letter-spacing: 8px; margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(178,223,219,0.3);
  }
  .intro-sub {
    color: rgba(178,223,219,0.8); font-size: 14px; letter-spacing: 3px;
  }
  .intro-hint {
    position: absolute; bottom: 60px;
    color: rgba(255,255,255,0.3); font-size: 13px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

  .restart-btn {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 12px; padding: 5px 10px;
    cursor: pointer; z-index: 35;
  }
</style>
</head>
<body>
<div id="app">
  <div class="flash-white" id="flashWhite"></div>

  <!-- Mode Selection -->
  <div class="screen mode-screen active" id="screenMode">
    <div class="hud">
      <div class="hud-top">
        <div class="hud-level">Lv.42</div>
        <div class="hud-coins">12,450</div>
      </div>
      <div class="hud-hp-bar"><div class="hud-hp-fill"></div></div>
    </div>
    <div class="mode-title">- 選 擇 玩 法 -</div>
    <div class="mode-list">
      <div class="mode-card card-adventure disabled">
        <div class="mc-icon">&#x2694;&#xFE0F;</div>
        <div class="mc-info">
          <div class="mc-name">一般冒險</div>
          <div class="mc-desc">探索未知區域，收集物資</div>
        </div>
        <div class="mc-arrow">&#x203A;</div>
        <div class="mc-badge">Lv.42</div>
      </div>
      <div class="mode-card card-daily disabled">
        <div class="mc-icon">&#x1F4C5;</div>
        <div class="mc-info">
          <div class="mc-name">每日挑戰</div>
          <div class="mc-desc">限時挑戰，豐厚獎勵</div>
        </div>
        <div class="mc-arrow">&#x203A;</div>
        <div class="mc-badge">0/3</div>
      </div>
      <div class="mode-card card-catharsis" onclick="enterCatharsis()">
        <div class="mc-icon">&#x1F44A;</div>
        <div class="mc-info">
          <div class="mc-name">煩惱清除戰</div>
          <div class="mc-desc">紓壓副玩法 - 把煩惱打成碎片</div>
        </div>
        <div class="mc-arrow">&#x203A;</div>
      </div>
    </div>
  </div>

  <!-- Tag Selection -->
  <div class="screen tag-screen" id="screenTags">
    <div class="tag-back" onclick="backToMode()">&#x2190; 返回</div>
    <div class="greeting">今天，什麼事讓你煩心？</div>
    <div class="tag-grid">
      <div class="tag-btn" onclick="selectTag('加班')">加班</div>
      <div class="tag-btn" onclick="selectTag('老闆')">老闆</div>
      <div class="tag-btn" onclick="selectTag('塞車')">塞車</div>
      <div class="tag-btn" onclick="selectTag('失眠')">失眠</div>
      <div class="tag-btn" onclick="selectTag('減肥')">減肥</div>
      <div class="tag-btn" onclick="selectTag('焦慮')">焦慮</div>
      <div class="tag-btn" onclick="selectTag('前任')">前任</div>
      <div class="tag-btn" onclick="selectTag('已讀不回')">已讀不回</div>
      <div class="tag-btn" onclick="selectTag('蚊子')">蚊子</div>
      <div class="tag-btn" onclick="selectTag('WiFi斷線')">WiFi斷線</div>
    </div>
    <div class="tag-whatever-wrap">
      <div class="tag-whatever" onclick="selectTag('隨便啦')">隨便啦，就是想打東西</div>
      <div class="tag-whatever-hint">不需要理由，打就對了</div>
    </div>
  </div>

  <!-- Transition -->
  <div class="screen transition-screen" id="screenTransition">
    <div class="transition-tag" id="transTag"></div>
    <div class="transition-sub">討 伐 開 始</div>
  </div>

  <!-- Battle -->
  <div class="screen battle-screen" id="screenBattle">
    <div class="battle-ground" id="battleGround"></div>
    <div class="battle-vignette"></div>
    <div class="battle-hud-top">
      <div class="battle-timer" id="battleTimer">00:00</div>
      <div class="battle-kills" id="battleKills">精英 &#xD7;0</div>
    </div>
    <div class="battle-flash" id="battleFlash"></div>
    <div id="battleField" style="position:absolute;top:0;left:0;right:0;bottom:0;"></div>
    <div class="skill-bar">
      <div class="skill-icon">&#x1F4A0;<span class="skill-cd">0.8s</span></div>
      <div class="skill-icon">&#x1F300;<span class="skill-cd">3.0s</span></div>
      <div class="skill-icon">&#x26A1;<span class="skill-cd">AUTO</span></div>
      <div class="skill-icon">&#x1F6E1;&#xFE0F;<span class="skill-cd">8.0s</span></div>
      <div class="skill-icon" style="opacity:0.3;">&#x1F512;</div>
    </div>
  </div>

  <!-- Settlement -->
  <div class="screen settle-screen" id="screenSettle">
    <div class="settle-title" id="settleTitle"></div>
    <div class="settle-stats" id="settleStats"></div>
    <div class="settle-quote" id="settleQuote"></div>
    <div class="settle-reward">順便拿了一些東西</div>
    <div class="settle-btns">
      <div class="settle-btn secondary" onclick="backToModeFromSettle()">回去了</div>
      <div class="settle-btn primary" onclick="goAgain()">再消滅一個</div>
    </div>
  </div>

  <!-- Intro -->
  <div class="intro-overlay" id="intro" onclick="startDemo()">
    <div class="intro-title">煩 惱 清 除 戰</div>
    <div class="intro-sub">Catharsis Mode</div>
    <div class="intro-hint">點擊開始</div>
  </div>

  <div class="restart-btn" onclick="fullRestart()" style="display:none" id="restartBtn">重來</div>
</div>

<script>
var TAGS = {
  '加班': { taunt:'你逃不掉加班的！', weak:'不…今天不是應該我贏嗎…', die:'加班…被打卡下班了…', quotes:['加班的事，明天再煩。今晚是你的。','報告寫不完，但你值得休息一下。'] },
  '老闆': { taunt:'這個月的 KPI 呢？', weak:'等等…我們可以談談…', die:'我只是…提個建議…', quotes:['KPI 不會因為你多想一秒就變好。先歇著。','會議結束了，真正的你可以回來了。'] },
  '塞車': { taunt:'哪裡都去不了喔～', weak:'等等…你超車了…', die:'路…通了…', quotes:['塞車已經結束了。至少在這裡不塞。','路通了。你也通了。'] },
  '失眠': { taunt:'還沒睡？不然想一下明天的事？', weak:'你怎麼精神這麼好…', die:'好吧…你睡吧…', quotes:['失眠的夜晚，至少你不是一個人。','不想睡的時候，就不要逼自己。'] },
  '減肥': { taunt:'今天的熱量還有剩喔～', weak:'你真的不吃嗎…', die:'好啦…明天再算…', quotes:['減肥明天開始也來得及。今天先開心。','你的價值不是體重秤說了算的。'] },
  '焦慮': { taunt:'你是不是忘了什麼事？', weak:'好像…沒什麼好擔心的…', die:'原來…可以不想…', quotes:['焦慮說到底，就是你太在乎。這不丟人。','想太多的人，通常也想得比別人深。'] },
  '前任': { taunt:'你不是說放下了嗎？', weak:'行吧…我走…', die:'這次…真的再見了。', quotes:['前任的事，就讓它留在上一關吧。','翻篇了。新的副本在前面。'] },
  '已讀不回': { taunt:'看到了，但我不想回。', weak:'…好吧，我回就是了…', die:'讀了…也回了…', quotes:['已讀不回？那你也不用秒回世界。','值得你在意的人，不會讓你等太久。'] },
  '蚊子': { taunt:'嗡～嗡～嗡～', weak:'嗡…嗡？', die:'啪。', quotes:['蚊子已伏法。正義得到伸張。','全世界最煩的聲音，已被你消音。'] },
  'WiFi斷線': { taunt:'連線中…連線中…失敗。', weak:'訊號…恢復中…', die:'已連線。', quotes:['WiFi 回來了嗎？沒有的話，至少這裡不斷線。','訊號滿格。心情也是。'] }
};
var TAG_NAMES = Object.keys(TAGS);
var GENERAL_QUOTES = ['打完了，感覺好一點了吧？','不管怎樣，你今天出了一口氣。','煩惱被你揍扁了。你很棒。','世界還是那個世界，但你剛剛贏了一場。'];

var currentTag=null, isRandomMode=false, eliteKills=0, battleActive=false, battleStartTime=0, battleAnimFrame=null;
var player={x:195,y:400}, mobs=[], elites=[], projectiles=[], xpGems=[];
var lastShot=0, lastAoe=0, lastMobSpawn=0, eliteSpawnTimes=[3000,8000,14000], eliteSpawnIndex=0, playerAngle=0;

function showScreen(id) {
  var s=document.querySelectorAll('.screen');
  for(var i=0;i<s.length;i++) s[i].classList.remove('active');
  if(id) document.getElementById(id).classList.add('active');
}
function startDemo() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('restartBtn').style.display='block';
}
function enterCatharsis() { showScreen('screenTags'); }
function backToMode() { showScreen('screenMode'); }
function selectTag(tag) {
  if(tag==='隨便啦') { isRandomMode=true; currentTag=TAG_NAMES[Math.floor(Math.random()*TAG_NAMES.length)]; }
  else { isRandomMode=false; currentTag=tag; }
  eliteKills=0;
  showScreen('screenTransition');
  document.getElementById('transTag').textContent=isRandomMode?'隨便啦':currentTag;
  setTimeout(function(){
    document.getElementById('flashWhite').classList.add('active');
    setTimeout(function(){
      document.getElementById('flashWhite').classList.remove('active');
      showScreen('screenBattle');
      startBattle();
    },300);
  },1000);
}
function startBattle() {
  battleActive=true; eliteKills=0; eliteSpawnIndex=0;
  battleStartTime=performance.now();
  lastShot=0; lastAoe=0; lastMobSpawn=0;
  player={x:195,y:400}; playerAngle=Math.random()*Math.PI*2;
  mobs=[]; elites=[]; projectiles=[]; xpGems=[];
  document.getElementById('battleKills').textContent='精英 \u00D70';
  document.getElementById('battleTimer').textContent='00:00';
  document.getElementById('battleField').innerHTML='';
  var pEl=document.createElement('div');
  pEl.className='player'; pEl.id='playerEl';
  pEl.style.left=player.x+'px'; pEl.style.top=player.y+'px';
  document.getElementById('battleField').appendChild(pEl);
  battleAnimFrame=requestAnimationFrame(battleLoop);
}
function battleLoop(now) {
  if(!battleActive) return;
  var elapsed=now-battleStartTime;
  var sec=Math.floor(elapsed/1000);
  document.getElementById('battleTimer').textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
  updatePlayer();
  var gx=Math.sin(now*0.0003)*8, gy=Math.cos(now*0.00025)*6;
  document.getElementById('battleGround').style.transform='translate('+gx+'px,'+gy+'px)';
  if(now-lastMobSpawn>400&&mobs.length<30){spawnMob();lastMobSpawn=now;}
  if(eliteSpawnIndex<eliteSpawnTimes.length&&elapsed>=eliteSpawnTimes[eliteSpawnIndex]){spawnElite();eliteSpawnIndex++;}
  if(now-lastShot>800){shootProjectile();lastShot=now;}
  if(now-lastAoe>3000){doAoe();lastAoe=now;}
  updateMobs();updateElites();updateProjectiles();updateXpGems();checkMobCollisions();
  battleAnimFrame=requestAnimationFrame(battleLoop);
}
function updatePlayer() {
  playerAngle+=0.008;
  player.x=195+Math.cos(playerAngle)*60;
  player.y=400+Math.sin(playerAngle*0.7)*45;
  player.x=Math.max(20,Math.min(370,player.x));
  player.y=Math.max(80,Math.min(760,player.y));
  var pEl=document.getElementById('playerEl');
  if(pEl){pEl.style.left=(player.x-14)+'px';pEl.style.top=(player.y-14)+'px';}
}
function spawnMob() {
  var field=document.getElementById('battleField');
  var side=Math.floor(Math.random()*4),x,y;
  if(side===0){x=Math.random()*390;y=-20;}
  else if(side===1){x=Math.random()*390;y=864;}
  else if(side===2){x=-20;y=Math.random()*844;}
  else{x=410;y=Math.random()*844;}
  var el=document.createElement('div');
  el.className='mob-small';
  el.style.left=x+'px';el.style.top=y+'px';
  field.appendChild(el);
  mobs.push({x:x,y:y,el:el,speed:0.8+Math.random()*0.6,dead:false});
}
function spawnElite() {
  var field=document.getElementById('battleField');
  var side=Math.floor(Math.random()*4),x,y;
  if(side===0){x=40+Math.random()*310;y=-40;}
  else if(side===1){x=40+Math.random()*310;y=884;}
  else if(side===2){x=-40;y=100+Math.random()*600;}
  else{x=430;y=100+Math.random()*600;}
  var el=document.createElement('div');
  el.className='mob-elite';el.innerHTML='\uD83D\uDC79';
  var eliteTag=currentTag;
  if(isRandomMode) eliteTag=TAG_NAMES[Math.floor(Math.random()*TAG_NAMES.length)];
  var hpBar=document.createElement('div');
  hpBar.className='elite-hp';
  hpBar.innerHTML='<div class="elite-hp-fill" style="width:100%"></div>';
  el.appendChild(hpBar);
  var bubble=document.createElement('div');
  bubble.className='worry-bubble';bubble.textContent=eliteTag;
  el.appendChild(bubble);
  el.style.left=x+'px';el.style.top=y+'px';
  field.appendChild(el);
  var elite={x:x,y:y,el:el,hp:6,maxHp:6,speed:0.35,dead:false,tag:eliteTag};
  elites.push(elite);
  setTimeout(function(){if(!elite.dead&&TAGS[eliteTag])showTaunt(el,TAGS[eliteTag].taunt);},800);
}
function shootProjectile() {
  var target=null,minD=Infinity;
  for(var i=0;i<elites.length;i++){
    if(elites[i].dead)continue;
    var d=dist(player.x,player.y,elites[i].x+18,elites[i].y+18);
    if(d<minD){minD=d;target={x:elites[i].x+18,y:elites[i].y+18};}
  }
  if(!target){for(var i=0;i<mobs.length;i++){
    if(mobs[i].dead)continue;
    var d=dist(player.x,player.y,mobs[i].x+8,mobs[i].y+8);
    if(d<minD){minD=d;target={x:mobs[i].x+8,y:mobs[i].y+8};}
  }}
  if(!target)return;
  var angle=Math.atan2(target.y-player.y,target.x-player.x);
  var el=document.createElement('div');
  el.className='projectile';
  el.style.left=player.x+'px';el.style.top=player.y+'px';
  document.getElementById('battleField').appendChild(el);
  projectiles.push({x:player.x,y:player.y,vx:Math.cos(angle)*5,vy:Math.sin(angle)*5,el:el,life:120});
}
function doAoe() {
  var field=document.getElementById('battleField');
  var ring=document.createElement('div');
  ring.className='aoe-ring';
  ring.style.left=player.x+'px';ring.style.top=player.y+'px';
  ring.style.width='160px';ring.style.height='160px';
  field.appendChild(ring);
  setTimeout(function(){ring.remove();},500);
  for(var i=0;i<mobs.length;i++){if(!mobs[i].dead&&dist(player.x,player.y,mobs[i].x+8,mobs[i].y+8)<80)killMob(mobs[i]);}
  for(var i=0;i<elites.length;i++){if(!elites[i].dead&&dist(player.x,player.y,elites[i].x+18,elites[i].y+18)<80)hitElite(elites[i],2);}
}
function updateProjectiles() {
  for(var i=projectiles.length-1;i>=0;i--){
    var p=projectiles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    p.el.style.left=(p.x-4)+'px';p.el.style.top=(p.y-4)+'px';
    if(p.life<=0||p.x<-20||p.x>420||p.y<-20||p.y>870){p.el.remove();projectiles.splice(i,1);continue;}
    var hit=false;
    for(var j=0;j<elites.length;j++){if(!elites[j].dead&&dist(p.x,p.y,elites[j].x+18,elites[j].y+18)<24){hitElite(elites[j],1);hit=true;break;}}
    if(!hit){for(var j=0;j<mobs.length;j++){if(!mobs[j].dead&&dist(p.x,p.y,mobs[j].x+8,mobs[j].y+8)<14){killMob(mobs[j]);hit=true;break;}}}
    if(hit){p.el.remove();projectiles.splice(i,1);}
  }
}
function hitElite(elite,dmg) {
  if(elite.dead)return;
  elite.hp-=dmg;
  var fill=elite.el.querySelector('.elite-hp-fill');
  if(fill)fill.style.width=Math.max(0,(elite.hp/elite.maxHp*100))+'%';
  elite.el.classList.remove('hit');void elite.el.offsetWidth;elite.el.classList.add('hit');
  if(elite.hp<=2&&elite.hp>0&&TAGS[elite.tag]){showTaunt(elite.el,TAGS[elite.tag].weak);if(fill)fill.style.background='#ff9800';}
  if(elite.hp<=0)killElite(elite);
}
function killElite(elite) {
  elite.dead=true;eliteKills++;
  document.getElementById('battleKills').textContent='精英 \u00D7'+eliteKills;
  if(TAGS[elite.tag])showTaunt(elite.el,TAGS[elite.tag].die);
  var bf=document.getElementById('battleFlash');
  bf.classList.remove('pop');void bf.offsetWidth;bf.classList.add('pop');
  var rect=elite.el.getBoundingClientRect();
  var appRect=document.getElementById('app').getBoundingClientRect();
  var cx=rect.left-appRect.left+rect.width/2;
  var cy=rect.top-appRect.top;
  shatterText(elite.tag,cx,cy);spawnColorRestore(cx,cy);
  var kt=document.createElement('div');kt.className='kill-text';
  kt.style.left=cx+'px';kt.style.top=(cy-20)+'px';kt.textContent='碎裂！';
  document.getElementById('app').appendChild(kt);
  setTimeout(function(){kt.remove();},1000);
  for(var i=0;i<6;i++)spawnXpGem(elite.x+18+(Math.random()-0.5)*40,elite.y+18+(Math.random()-0.5)*40);
  elite.el.classList.add('dying');
  setTimeout(function(){elite.el.remove();},400);
  if(eliteKills>=3)setTimeout(function(){endBattle();},600);
}
function killMob(mob) {
  if(mob.dead)return;mob.dead=true;
  mob.el.classList.add('dying');
  spawnXpGem(mob.x+8,mob.y+8);
  setTimeout(function(){mob.el.remove();},200);
}
function checkMobCollisions() {
  for(var i=0;i<mobs.length;i++){if(!mobs[i].dead&&dist(player.x,player.y,mobs[i].x+8,mobs[i].y+8)<20)killMob(mobs[i]);}
}
function updateMobs() {
  for(var i=mobs.length-1;i>=0;i--){
    var m=mobs[i];
    if(m.dead){if(!m.el.parentNode)mobs.splice(i,1);continue;}
    var dx=player.x-m.x-8,dy=player.y-m.y-8;
    var d=Math.sqrt(dx*dx+dy*dy)||1;
    m.x+=(dx/d)*m.speed;m.y+=(dy/d)*m.speed;
    m.el.style.left=m.x+'px';m.el.style.top=m.y+'px';
  }
}
function updateElites() {
  for(var i=elites.length-1;i>=0;i--){
    var e=elites[i];
    if(e.dead){if(!e.el.parentNode)elites.splice(i,1);continue;}
    var dx=player.x-e.x-18,dy=player.y-e.y-18;
    var d=Math.sqrt(dx*dx+dy*dy)||1;
    e.x+=(dx/d)*e.speed;e.y+=(dy/d)*e.speed;
    e.el.style.left=e.x+'px';e.el.style.top=e.y+'px';
  }
}
function spawnXpGem(x,y) {
  var field=document.getElementById('battleField');
  var el=document.createElement('div');el.className='xp-gem';
  el.style.left=x+'px';el.style.top=y+'px';
  field.appendChild(el);
  xpGems.push({x:x,y:y,el:el,age:0});
}
function updateXpGems() {
  for(var i=xpGems.length-1;i>=0;i--){
    var g=xpGems[i];g.age++;
    if(g.age>30){
      var dx=player.x-g.x,dy=player.y-g.y;
      var d=Math.sqrt(dx*dx+dy*dy)||1;
      g.x+=(dx/d)*4;g.y+=(dy/d)*4;
      g.el.style.left=g.x+'px';g.el.style.top=g.y+'px';
      if(d<16){g.el.remove();xpGems.splice(i,1);}
    }
  }
}
function showTaunt(el,text) {
  var ex=el.querySelectorAll('.taunt-bubble');
  for(var i=0;i<ex.length;i++)ex[i].remove();
  var taunt=document.createElement('div');taunt.className='taunt-bubble';taunt.textContent=text;
  el.appendChild(taunt);
  setTimeout(function(){if(taunt.parentNode)taunt.remove();},2000);
}
function shatterText(text,cx,cy) {
  var chars=text.split('');
  for(var i=0;i<chars.length;i++){
    (function(c,idx){
      var el=document.createElement('div');el.className='shatter-piece';el.textContent=c;
      el.style.left=cx+'px';el.style.top=cy+'px';
      var angle=(idx/chars.length)*Math.PI*2+Math.random()*0.5;
      var d=40+Math.random()*40;
      el.style.setProperty('--tx',Math.cos(angle)*d+'px');
      el.style.setProperty('--ty',Math.sin(angle)*d+'px');
      el.style.setProperty('--rot',(Math.random()*360-180)+'deg');
      document.getElementById('app').appendChild(el);
      setTimeout(function(){el.classList.add('fly');},10);
      setTimeout(function(){el.remove();},700);
    })(chars[i],i);
  }
}
function spawnColorRestore(cx,cy) {
  var el=document.createElement('div');el.className='color-restore';
  el.style.left=cx+'px';el.style.top=cy+'px';
  el.style.width='250px';el.style.height='250px';
  document.getElementById('app').appendChild(el);
  setTimeout(function(){el.remove();},900);
}
function endBattle() {
  if(!battleActive)return;battleActive=false;
  if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
  showScreen(null);
  document.getElementById('battleField').innerHTML='';
  mobs=[];elites=[];projectiles=[];xpGems=[];
  var elapsed=performance.now()-battleStartTime;
  var sec=Math.floor(elapsed/1000);
  setTimeout(function(){
    var displayTag=isRandomMode?'各種煩惱':currentTag;
    document.getElementById('settleTitle').textContent='\u3014'+displayTag+'\u3015已消滅';
    document.getElementById('settleStats').innerHTML='消滅精英 \u00D7'+eliteKills+' \u00B7 存活 '+sec+' 秒 \u00B7 今日第 1 次';
    var quote;
    if(isRandomMode){quote=GENERAL_QUOTES[Math.floor(Math.random()*GENERAL_QUOTES.length)];}
    else{var t=TAGS[currentTag];var allQ=t.quotes.concat(GENERAL_QUOTES);quote=allQ[Math.floor(Math.random()*allQ.length)];}
    document.getElementById('settleQuote').textContent='\u300C'+quote+'\u300D';
    showScreen('screenSettle');
  },400);
}
function goAgain(){showScreen('screenTags');}
function backToModeFromSettle(){showScreen('screenMode');}
function fullRestart(){
  battleActive=false;if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
  document.getElementById('battleField').innerHTML='';
  mobs=[];elites=[];projectiles=[];xpGems=[];
  showScreen('screenMode');
}
function dist(x1,y1,x2,y2){var dx=x1-x2,dy=y1-y2;return Math.sqrt(dx*dx+dy*dy);}
