<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>情緒四象限 — 遊戲原型</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0e17;--surface:#1a1932;--panel:#16152b;
    --q-green:rgba(74,222,128,.18);--q-yellow:rgba(251,191,36,.18);
    --q-blue:rgba(96,165,250,.18);--q-red:rgba(248,113,113,.18);
    --text:#fffffe;--text-dim:#7a7a9e;--accent:#7f5af0;
    --gold:#f0c040;--hp-green:#4ade80;--hp-bg:rgba(255,255,255,.08);
    --mint:#B2DFDB;--mint-glow:rgba(178,223,219,.35);
  }
  html,body{height:100%;background:#080818;color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden;touch-action:manipulation;user-select:none}
  body{display:flex;justify-content:center;align-items:center}

  #app{position:relative;width:100%;max-width:390px;height:100vh;max-height:844px;overflow:hidden;background:var(--bg);display:flex;flex-direction:column}

  /* ========== Game HUD ========== */
  .hud{position:relative;z-index:50;display:flex;align-items:center;gap:10px;padding:10px 16px 8px;background:linear-gradient(180deg,rgba(15,14,23,.98) 80%,rgba(15,14,23,0));flex-shrink:0}
  .hud-avatar{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold);background:linear-gradient(135deg,#2a2650,#1a1932);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 8px rgba(240,192,64,.3)}
  .hud-info{flex:1;min-width:0}
  .hud-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
  .hud-name .lvl{font-size:11px;color:var(--gold);background:rgba(240,192,64,.15);padding:1px 6px;border-radius:8px;font-weight:900}
  .hud-bars{margin-top:3px;display:flex;flex-direction:column;gap:2px}
  .bar-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-dim)}
  .bar-track{flex:1;height:6px;background:var(--hp-bg);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
  .bar-fill.hp{background:linear-gradient(90deg,#22c55e,#4ade80);width:78%}
  .bar-fill.sp{background:linear-gradient(90deg,#7f5af0,#a78bfa);width:62%}
  .hud-right{display:flex;gap:8px;flex-shrink:0}
  .hud-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}

  /* ========== Main Content Area ========== */
  .main-content{flex:1;overflow:hidden;position:relative}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none;transition:opacity .5s ease;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .screen.active{opacity:1;pointer-events:auto}

  /* ========== Bottom Nav ========== */
  .bottom-nav{position:relative;z-index:50;display:flex;background:linear-gradient(0deg,rgba(15,14,23,.98) 80%,rgba(15,14,23,0));padding:4px 8px 10px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.04)}
  .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;border:none;background:none;color:var(--text-dim);font-family:inherit;font-size:10px;font-weight:700;transition:color .2s}
  .nav-tab .nav-icon{font-size:20px;transition:transform .2s}
  .nav-tab.active{color:var(--accent)}
  .nav-tab.active .nav-icon{transform:scale(1.15)}
  .nav-tab.active::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:1px;box-shadow:0 0 6px var(--accent)}

  /* ========== Welcome Screen ========== */
  #welcome{justify-content:center;background:radial-gradient(ellipse at 50% 60%,#1e1b4b 0%,var(--bg) 70%)}
  .welcome-icon{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .welcome-title{font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:10px}
  .welcome-sub{font-size:15px;color:var(--text-dim);margin-bottom:40px;text-align:center;line-height:1.6;padding:0 32px}
  .btn{padding:14px 40px;border:none;border-radius:60px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .btn:active{transform:scale(.93)}
  .btn-primary{background:linear-gradient(135deg,#7f5af0,#2cb67d);color:#fff;box-shadow:0 4px 24px rgba(127,90,240,.35)}
  .btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.1)}
  .btn-mint{background:linear-gradient(135deg,#2cb67d,#72efdd);color:#0f0e17;box-shadow:0 4px 24px rgba(44,182,125,.3)}

  /* ========== Quadrant Screen ========== */
  #quadrant{padding:16px;justify-content:flex-start;padding-top:12px}
  .q-header{text-align:center;margin-bottom:12px}
  .q-header h2{font-size:20px;font-weight:900;letter-spacing:1px;
    background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .q-header p{font-size:12px;color:var(--text-dim);margin-top:2px}
  .q-container{position:relative;width:100%;aspect-ratio:1/1;max-width:320px;margin:0 auto}
  .q-grid{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;border-radius:16px;overflow:hidden}
  .q-cell{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);padding:12px;text-align:center;line-height:1.4;flex-direction:column;gap:2px}
  .q-cell:nth-child(1){background:var(--q-green);border-bottom:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06)}
  .q-cell:nth-child(2){background:var(--q-yellow);border-bottom:1px solid rgba(255,255,255,.06)}
  .q-cell:nth-child(3){background:var(--q-blue);border-right:1px solid rgba(255,255,255,.06)}
  .q-cell:nth-child(4){background:var(--q-red)}
  .q-cell .emoji{font-size:26px;display:block}
  .q-canvas{position:absolute;inset:0;border-radius:16px;cursor:crosshair;z-index:2}
  .axis-label{position:absolute;font-size:11px;color:var(--text-dim);font-weight:700;z-index:3;pointer-events:none;white-space:nowrap}
  .axis-y-top{top:-22px;left:50%;transform:translateX(-50%)}
  .axis-y-bottom{bottom:-22px;left:50%;transform:translateX(-50%)}
  .axis-x-left{left:-8px;top:50%;transform:translateY(-50%) rotate(-90deg)}
  .axis-x-right{right:-8px;top:50%;transform:translateY(-50%) rotate(90deg)}
  .my-dot{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--mint);box-shadow:0 0 16px var(--mint-glow),0 0 40px var(--mint-glow);z-index:10;pointer-events:none;transform:translate(-50%,-50%) scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1);will-change:left,top}
  .my-dot.placed{transform:translate(-50%,-50%) scale(1)}
  .my-dot::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--mint);opacity:.5;animation:ping 1.5s ease-out infinite}
  @keyframes ping{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
  .q-readout{margin-top:14px;text-align:center;min-height:28px}
  .q-readout .val{font-size:14px;color:var(--mint);font-weight:700;opacity:0;transition:opacity .3s;text-shadow:0 0 10px var(--mint-glow)}
  .q-readout .val.show{opacity:1}
  .q-zone-badge{font-size:16px;font-weight:900;opacity:0;transition:opacity .3s;margin-bottom:2px;letter-spacing:1px}
  .q-zone-badge.show{opacity:1}
  .q-actions{margin-top:10px;display:flex;gap:12px}

  /* ========== Result Screen ========== */
  #result{padding:16px;justify-content:flex-start;padding-top:12px}
  .r-title{font-size:18px;font-weight:900;margin-bottom:12px;text-align:center;
    background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .r-quadrant-wrap{position:relative;width:100%;max-width:260px;aspect-ratio:1/1;margin:0 auto 14px}
  .r-quadrant-bg{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;border-radius:14px;overflow:hidden}
  .r-quadrant-bg div:nth-child(1){background:var(--q-green)}
  .r-quadrant-bg div:nth-child(2){background:var(--q-yellow)}
  .r-quadrant-bg div:nth-child(3){background:var(--q-blue)}
  .r-quadrant-bg div:nth-child(4){background:var(--q-red)}
  .r-canvas{position:absolute;inset:0;border-radius:14px;z-index:2}
  .r-my-dot{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--mint);box-shadow:0 0 12px var(--mint-glow);z-index:10;pointer-events:none;transform:translate(-50%,-50%)}
  .r-my-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--mint);opacity:.5;animation:ping 1.5s ease-out infinite}
  .stats{width:100%;max-width:320px;display:flex;flex-direction:column;gap:8px}
  .stat-card{background:var(--surface);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease;border:1px solid rgba(255,255,255,.04)}
  .stat-card.show{opacity:1;transform:translateY(0)}
  .stat-icon{font-size:28px;flex-shrink:0}
  .stat-body{flex:1}
  .stat-label{font-size:11px;color:var(--text-dim);margin-bottom:1px}
  .stat-value{font-size:16px;font-weight:900}
  .stat-value .highlight{color:var(--mint)}
  .weather-card{background:linear-gradient(135deg,#1e1b4b,#312e81)!important;border:1px solid rgba(127,90,240,.2)!important}
  .r-actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  /* ========== Trajectory Screen ========== */
  #trajectory{padding:16px;justify-content:flex-start;padding-top:12px}
  .t-title{font-size:18px;font-weight:900;margin-bottom:2px;text-align:center;
    background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .t-sub{font-size:12px;color:var(--text-dim);margin-bottom:14px;text-align:center}
  .t-chart-wrap{position:relative;width:100%;max-width:300px;aspect-ratio:1/1;margin:0 auto 12px}
  .t-quadrant-bg{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;border-radius:14px;overflow:hidden}
  .t-quadrant-bg div:nth-child(1){background:var(--q-green)}
  .t-quadrant-bg div:nth-child(2){background:var(--q-yellow)}
  .t-quadrant-bg div:nth-child(3){background:var(--q-blue)}
  .t-quadrant-bg div:nth-child(4){background:var(--q-red)}
  .t-canvas{position:absolute;inset:0;border-radius:14px;z-index:2}
  .t-legend{display:flex;gap:20px;justify-content:center;margin-bottom:10px}
  .t-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
  .t-legend-dot{width:10px;height:10px;border-radius:50%}
  .t-insight{background:var(--surface);border-radius:12px;padding:14px 16px;max-width:320px;width:100%;text-align:center;font-size:13px;line-height:1.6;color:var(--text-dim);margin-bottom:14px;border:1px solid rgba(255,255,255,.04)}
  .t-insight b{color:var(--text);font-weight:700}
  .t-actions{display:flex;gap:10px}

  /* ========== Heatmap Screen ========== */
  #heatmap{padding:16px;justify-content:flex-start;padding-top:12px}
  .h-badge{display:inline-block;background:rgba(127,90,240,.15);color:#a78bfa;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:8px;border:1px solid rgba(127,90,240,.25)}
  .h-title{font-size:18px;font-weight:900;margin-bottom:2px;text-align:center;
    background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .h-weather{font-size:42px;margin:8px 0 2px}
  .h-weather-name{font-size:16px;font-weight:700;margin-bottom:12px}
  .h-quadrant-wrap{position:relative;width:100%;max-width:220px;aspect-ratio:1/1;margin:0 auto 14px}
  .h-quadrant-bg{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;border-radius:14px;overflow:hidden}
  .h-quadrant-bg div:nth-child(1){background:var(--q-green)}
  .h-quadrant-bg div:nth-child(2){background:var(--q-yellow)}
  .h-quadrant-bg div:nth-child(3){background:var(--q-blue)}
  .h-quadrant-bg div:nth-child(4){background:var(--q-red)}
  .h-canvas{position:absolute;inset:0;border-radius:14px;z-index:2}
  .h-stats{width:100%;max-width:320px;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .h-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
  .h-bar-label{width:44px;text-align:right;color:var(--text-dim);flex-shrink:0}
  .h-bar{flex:1;height:20px;border-radius:6px;overflow:hidden;background:rgba(255,255,255,.05)}
  .h-bar-fill{height:100%;border-radius:6px;transition:width 1s ease}
  .h-bar-pct{width:36px;font-weight:700;font-size:12px}

  /* Responsive */
  @media(max-height:720px){
    .q-container{max-width:280px}
    .r-quadrant-wrap{max-width:220px}
    .t-chart-wrap{max-width:260px}
    .h-quadrant-wrap{max-width:190px}
    .welcome-icon{font-size:56px}
    .welcome-title{font-size:24px}
  }
  @media(max-height:640px){
    .hud{padding:6px 12px 4px}
    .hud-avatar{width:34px;height:34px;font-size:16px}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ========== Game HUD ========== -->
  <div class="hud">
    <div class="hud-avatar">🐱</div>
    <div class="hud-info">
      <div class="hud-name">夜行貓 <span class="lvl">Lv.42</span></div>
      <div class="hud-bars">
        <div class="bar-row"><span style="width:20px">HP</span><div class="bar-track"><div class="bar-fill hp"></div></div><span>78%</span></div>
        <div class="bar-row"><span style="width:20px">SP</span><div class="bar-track"><div class="bar-fill sp"></div></div><span>62%</span></div>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-btn">📬</div>
      <div class="hud-btn">⚙️</div>
    </div>
  </div>

  <!-- ========== Main Content ========== -->
  <div class="main-content">

    <!-- Welcome -->
    <div id="welcome" class="screen active">
      <div class="welcome-icon">🫧</div>
      <div class="welcome-title">情緒四象限</div>
      <div class="welcome-sub">點一個點，記錄你現在的心情。<br>只需要 1 秒鐘。</div>
      <button class="btn btn-primary" onclick="goTo('quadrant')">開始</button>
    </div>

    <!-- Quadrant Input -->
    <div id="quadrant" class="screen">
      <div class="q-header">
        <h2>今天的你，在哪裡？</h2>
        <p>在座標上點擊或拖曳你現在的位置</p>
      </div>
      <div class="q-container">
        <div class="axis-label axis-y-top">快樂 😊 ↑</div>
        <div class="axis-label axis-y-bottom">↓ 不快樂 😔</div>
        <div class="axis-label axis-x-left">← 輕鬆</div>
        <div class="axis-label axis-x-right">壓力大 →</div>
        <div class="q-grid">
          <div class="q-cell"><span class="emoji">😌</span>放鬆愜意</div>
          <div class="q-cell"><span class="emoji">🔥</span>充實興奮</div>
          <div class="q-cell"><span class="emoji">😶</span>無聊空虛</div>
          <div class="q-cell"><span class="emoji">😰</span>焦慮壓迫</div>
        </div>
        <canvas class="q-canvas" id="qCanvas"></canvas>
        <div class="my-dot" id="myDot"></div>
      </div>
      <div class="q-readout">
        <div class="q-zone-badge" id="zoneBadge"></div>
        <div class="val" id="readout"></div>
      </div>
      <div class="q-actions">
        <button class="btn btn-secondary" onclick="resetDot()">重新選</button>
        <button class="btn btn-mint" id="btnConfirm" style="opacity:.3;pointer-events:none" onclick="confirmMood()">就是這裡</button>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="screen">
      <div class="r-title">已記錄 ✨</div>
      <div class="r-quadrant-wrap">
        <div class="r-quadrant-bg"><div></div><div></div><div></div><div></div></div>
        <canvas class="r-canvas" id="rCanvas"></canvas>
        <div class="r-my-dot" id="rMyDot"></div>
      </div>
      <div class="stats" id="statsContainer">
        <div class="stat-card" id="stat1">
          <div class="stat-icon">👥</div>
          <div class="stat-body">
            <div class="stat-label">全服今日打卡</div>
            <div class="stat-value"><span class="highlight" id="totalPlayers">47,832</span> 人</div>
          </div>
        </div>
        <div class="stat-card" id="stat2">
          <div class="stat-icon">🤝</div>
          <div class="stat-body">
            <div class="stat-label">你的象限</div>
            <div class="stat-value"><span class="highlight" id="sameQuadrant">12,401</span> 人與你同行</div>
          </div>
        </div>
        <div class="stat-card weather-card" id="stat3">
          <div class="stat-icon" id="weatherIcon">☀️</div>
          <div class="stat-body">
            <div class="stat-label">今日全服情緒氣候</div>
            <div class="stat-value" id="weatherText">晴天</div>
          </div>
        </div>
      </div>
      <div class="r-actions">
        <button class="btn btn-secondary" onclick="goTo('trajectory')">我的軌跡</button>
        <button class="btn btn-secondary" onclick="goTo('heatmap')">全服氣候</button>
      </div>
    </div>

    <!-- Trajectory -->
    <div id="trajectory" class="screen">
      <div class="t-title">你的情緒軌跡</div>
      <div class="t-sub">過去 7 天</div>
      <div class="t-chart-wrap">
        <div class="t-quadrant-bg"><div></div><div></div><div></div><div></div></div>
        <canvas class="t-canvas" id="tCanvas"></canvas>
      </div>
      <div class="t-legend">
        <div class="t-legend-item"><div class="t-legend-dot" style="background:var(--mint)"></div>你的位置</div>
        <div class="t-legend-item"><div class="t-legend-dot" style="background:#a78bfa"></div>全服平均</div>
      </div>
      <div class="t-insight" id="tInsight"></div>
      <div class="t-actions">
        <button class="btn btn-secondary" onclick="goTo('result')">返回</button>
        <button class="btn btn-secondary" onclick="goTo('heatmap')">全服氣候</button>
      </div>
    </div>

    <!-- Heatmap -->
    <div id="heatmap" class="screen">
      <div class="h-badge">21:00 結算</div>
      <div class="h-title">今日情緒氣候</div>
      <div class="h-weather" id="hWeatherIcon">☀️</div>
      <div class="h-weather-name" id="hWeatherName">晴天</div>
      <div class="h-quadrant-wrap">
        <div class="h-quadrant-bg"><div></div><div></div><div></div><div></div></div>
        <canvas class="h-canvas" id="hCanvas"></canvas>
      </div>
      <div class="h-stats" id="hStats">
        <div class="h-bar-row"><div class="h-bar-label">😌 放鬆</div><div class="h-bar"><div class="h-bar-fill" style="width:0;background:#4ade80" id="bar1"></div></div><div class="h-bar-pct" id="pct1">0%</div></div>
        <div class="h-bar-row"><div class="h-bar-label">🔥 興奮</div><div class="h-bar"><div class="h-bar-fill" style="width:0;background:#fbbf24" id="bar2"></div></div><div class="h-bar-pct" id="pct2">0%</div></div>
        <div class="h-bar-row"><div class="h-bar-label">😶 無聊</div><div class="h-bar"><div class="h-bar-fill" style="width:0;background:#60a5fa" id="bar3"></div></div><div class="h-bar-pct" id="pct3">0%</div></div>
        <div class="h-bar-row"><div class="h-bar-label">😰 焦慮</div><div class="h-bar"><div class="h-bar-fill" style="width:0;background:#f87171" id="bar4"></div></div><div class="h-bar-pct" id="pct4">0%</div></div>
      </div>
      <div style="text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:14px" id="hTotal"></div>
      <div class="t-actions">
        <button class="btn btn-secondary" onclick="goTo('result')">返回</button>
        <button class="btn btn-mint" onclick="restart()">再打一次卡</button>
      </div>
    </div>

  </div>

  <!-- ========== Bottom Nav ========== -->
  <div class="bottom-nav">
    <button class="nav-tab"><span class="nav-icon">🏰</span>主城</button>
    <button class="nav-tab"><span class="nav-icon">🎒</span>背包</button>
    <button class="nav-tab"><span class="nav-icon">⚔️</span>冒險</button>
    <button class="nav-tab"><span class="nav-icon">👥</span>社交</button>
    <button class="nav-tab active"><span class="nav-icon">🧭</span>情緒</button>
  </div>
</div>

<script>
// ==================== State ====================
var myX = -1, myY = -1;
var placed = false;
var isDragging = false;
var canvasEventsReady = false;

var fakeHistory = [
  {s:.35,h:.72},{s:.55,h:.60},{s:.70,h:.40},{s:.60,h:.45},{s:.40,h:.65},{s:.30,h:.80}
];
var serverAvg = [
  {s:.48,h:.55},{s:.52,h:.50},{s:.58,h:.45},{s:.55,h:.48},{s:.50,h:.52},{s:.45,h:.58},{s:.47,h:.54}
];
var dayLabels = ['一','二','三','四','五','六','日'];

// ==================== Navigation ====================
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  if (id === 'quadrant') initQuadrantCanvas();
  if (id === 'result') showResult();
  if (id === 'trajectory') showTrajectory();
  if (id === 'heatmap') showHeatmap();
}

function restart() {
  placed = false;
  myX = -1; myY = -1;
  var dot = document.getElementById('myDot');
  dot.classList.remove('placed');
  document.getElementById('readout').classList.remove('show');
  document.getElementById('zoneBadge').classList.remove('show');
  document.getElementById('btnConfirm').style.opacity = '.3';
  document.getElementById('btnConfirm').style.pointerEvents = 'none';
  goTo('quadrant');
}

// ==================== Quadrant Canvas ====================
function initQuadrantCanvas() {
  var canvas = document.getElementById('qCanvas');
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawCrosshair(ctx, rect.width, rect.height);

  function updateDotPosition(clientX, clientY) {
    var r = canvas.getBoundingClientRect();
    var px = (clientX - r.left) / r.width;
    var py = (clientY - r.top) / r.height;
    myX = Math.max(0, Math.min(1, px));
    myY = Math.max(0, Math.min(1, 1 - py));
    placed = true;
    var dot = document.getElementById('myDot');
    dot.style.left = (myX * 100) + '%';
    dot.style.top = ((1 - myY) * 100) + '%';
    dot.classList.add('placed');
    var happiness = Math.round(myY * 100);
    var stress = Math.round(myX * 100);
    var readout = document.getElementById('readout');
    readout.textContent = '快樂 ' + happiness + '　壓力 ' + stress;
    readout.classList.add('show');

    var qName = getQuadrantName(myX, myY);
    var qEmoji = getQuadrantEmoji(myX, myY);
    var badge = document.getElementById('zoneBadge');
    badge.textContent = qEmoji + ' ' + qName;
    badge.classList.add('show');

    document.getElementById('btnConfirm').style.opacity = '1';
    document.getElementById('btnConfirm').style.pointerEvents = 'auto';
  }

  if (!canvasEventsReady) {
    canvasEventsReady = true;
    canvas.addEventListener('mousedown', function(e) {
      isDragging = true;
      updateDotPosition(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', function(e) {
      if (isDragging) updateDotPosition(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', function() { isDragging = false; });
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      isDragging = true;
      updateDotPosition(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});
    canvas.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (isDragging) updateDotPosition(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});
    canvas.addEventListener('touchend', function() { isDragging = false; });
  }
}

function drawCrosshair(ctx, w, h) {
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
  ctx.setLineDash([]);
}

function resetDot() {
  placed = false;
  document.getElementById('myDot').classList.remove('placed');
  document.getElementById('readout').classList.remove('show');
  document.getElementById('zoneBadge').classList.remove('show');
  document.getElementById('btnConfirm').style.opacity = '.3';
  document.getElementById('btnConfirm').style.pointerEvents = 'none';
}

function confirmMood() {
  if (!placed) return;
  goTo('result');
}

function getQuadrantName(x, y) {
  if (x < .5 && y >= .5) return '放鬆愜意';
  if (x >= .5 && y >= .5) return '充實興奮';
  if (x < .5 && y < .5) return '無聊空虛';
  return '焦慮壓迫';
}

function getQuadrantEmoji(x, y) {
  if (x < .5 && y >= .5) return '😌';
  if (x >= .5 && y >= .5) return '🔥';
  if (x < .5 && y < .5) return '😶';
  return '😰';
}

// ==================== Result Screen ====================
function showResult() {
  var wrap = document.querySelector('.r-quadrant-wrap');
  var rect = wrap.getBoundingClientRect();
  var canvas = document.getElementById('rCanvas');
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  var dot = document.getElementById('rMyDot');
  dot.style.left = (myX * 100) + '%';
  dot.style.top = ((1 - myY) * 100) + '%';

  var dots = generateCommunityDots(400);
  animateDots(ctx, dots, rect.width, rect.height);

  var qPop = getQuadrantPop(myX, myY);

  var cards = document.querySelectorAll('.stat-card');
  cards.forEach(function(c) { c.classList.remove('show'); });

  document.getElementById('sameQuadrant').textContent = qPop.toLocaleString();

  var weather = getWeather();
  document.getElementById('weatherIcon').textContent = weather.icon;
  document.getElementById('weatherText').textContent = weather.name;

  setTimeout(function() { cards[0].classList.add('show'); }, 600);
  setTimeout(function() { cards[1].classList.add('show'); }, 900);
  setTimeout(function() { cards[2].classList.add('show'); }, 1200);
}

function generateCommunityDots(count) {
  var dots = [];
  var clusters = [
    {cx:.25,cy:.75,r:.2,weight:.35,color:'rgba(74,222,128,'},
    {cx:.65,cy:.65,r:.18,weight:.2,color:'rgba(251,191,36,'},
    {cx:.3,cy:.35,r:.15,weight:.15,color:'rgba(96,165,250,'},
    {cx:.7,cy:.25,r:.2,weight:.3,color:'rgba(248,113,113,'}
  ];
  for (var i = 0; i < count; i++) {
    var r = Math.random(), acc = 0, cluster = clusters[0];
    for (var c = 0; c < clusters.length; c++) { acc += clusters[c].weight; if (r < acc) { cluster = clusters[c]; break; } }
    var angle = Math.random() * Math.PI * 2;
    var dist = Math.random() * cluster.r;
    var x = Math.max(.02, Math.min(.98, cluster.cx + Math.cos(angle) * dist));
    var y = Math.max(.02, Math.min(.98, cluster.cy + Math.sin(angle) * dist));
    var alpha = .15 + Math.random() * .25;
    dots.push({x: x, y: 1 - y, alpha: alpha, color: cluster.color + alpha + ')', delay: Math.random()});
  }
  return dots;
}

function animateDots(ctx, dots, w, h) {
  var sorted = dots.sort(function(a, b) { return a.delay - b.delay; });
  var duration = 1500;
  var start = performance.now();

  function frame(now) {
    var elapsed = now - start;
    var progress = Math.min(1, elapsed / duration);
    ctx.clearRect(0, 0, w, h);
    drawCrosshair(ctx, w, h);

    var visible = Math.floor(progress * sorted.length);
    for (var i = 0; i < visible; i++) {
      var d = sorted[i];
      ctx.beginPath();
      ctx.arc(d.x * w, d.y * h, 3, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.fill();
    }
    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function getQuadrantPop(x, y) {
  var pops = {'放鬆愜意': 16742, '充實興奮': 9583, '無聊空虛': 7106, '焦慮壓迫': 14401};
  return pops[getQuadrantName(x, y)];
}

function getWeather() {
  var weathers = [
    {icon: '☀️', name: '晴天'},
    {icon: '⛅', name: '多雲'},
    {icon: '🌧️', name: '雷雨'},
    {icon: '🌤️', name: '晴時多雲'}
  ];
  return weathers[Math.floor(Math.random() * weathers.length)];
}

// ==================== Trajectory Screen ====================
function showTrajectory() {
  var wrap = document.querySelector('.t-chart-wrap');
  var rect = wrap.getBoundingClientRect();
  var canvas = document.getElementById('tCanvas');
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  var w = rect.width, h = rect.height;

  drawCrosshair(ctx, w, h);

  var myPath = fakeHistory.slice();
  myPath.push({s: myX, h: myY});

  var duration = 1200;
  var start = performance.now();

  function frame(now) {
    var elapsed = now - start;
    var progress = Math.min(1, elapsed / duration);
    ctx.clearRect(0, 0, w, h);
    drawCrosshair(ctx, w, h);

    var visCount = Math.floor(progress * myPath.length) + 1;

    var svgProgress = Math.min(1, progress * 1.2);
    var svgCount = Math.floor(svgProgress * serverAvg.length);
    if (svgCount >= 2) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(167,139,250,.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      for (var i = 0; i < svgCount; i++) {
        var px = serverAvg[i].s * w;
        var py = (1 - serverAvg[i].h) * h;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      for (var i = 0; i < svgCount; i++) {
        ctx.beginPath();
        ctx.arc(serverAvg[i].s * w, (1 - serverAvg[i].h) * h, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#a78bfa';
        ctx.fill();
      }
    }

    if (visCount >= 2) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(178,223,219,.7)';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([]);
      for (var i = 0; i < Math.min(visCount, myPath.length); i++) {
        var px = myPath[i].s * w;
        var py = (1 - myPath[i].h) * h;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    for (var i = 0; i < Math.min(visCount, myPath.length); i++) {
      var px = myPath[i].s * w;
      var py = (1 - myPath[i].h) * h;
      var isToday = (i === myPath.length - 1);
      ctx.beginPath();
      ctx.arc(px, py, isToday ? 8 : 5, 0, Math.PI * 2);
      ctx.fillStyle = isToday ? '#B2DFDB' : 'rgba(178,223,219,.6)';
      ctx.fill();
      if (isToday) {
        ctx.beginPath();
        ctx.arc(px, py, 12, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(178,223,219,.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      ctx.font = (isToday ? 'bold ' : '') + '11px "Noto Sans TC",sans-serif';
      ctx.fillStyle = isToday ? '#fff' : 'rgba(255,255,255,.5)';
      ctx.textAlign = 'center';
      ctx.fillText(isToday ? '今天' : '週' + dayLabels[i], px, py - (isToday ? 16 : 12));
    }

    if (progress < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  var insight = document.getElementById('tInsight');
  var happyToday = Math.round(myY * 100);
  var avgHappy = Math.round(fakeHistory.reduce(function(s, d) { return s + d.h; }, 0) / fakeHistory.length * 100);
  var diff = happyToday - avgHappy;
  if (diff > 10) {
    insight.innerHTML = '今天的你比過去一週<b>開心了 ' + diff + ' 點</b> 🎉<br>繼續保持！';
  } else if (diff < -10) {
    insight.innerHTML = '今天有點辛苦，比平常<b>低了 ' + Math.abs(diff) + ' 點</b>。<br>沒關係，明天會更好。';
  } else {
    insight.innerHTML = '這週的你，狀態<b>蠻穩定</b>的 😊<br>保持節奏就好。';
  }
}

// ==================== Heatmap Screen ====================
function showHeatmap() {
  var wrap = document.querySelector('.h-quadrant-wrap');
  var rect = wrap.getBoundingClientRect();
  var canvas = document.getElementById('hCanvas');
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  var dots = generateCommunityDots(800);
  animateDots(ctx, dots, rect.width, rect.height);

  var weather = getWeather();
  document.getElementById('hWeatherIcon').textContent = weather.icon;
  document.getElementById('hWeatherName').textContent = weather.name;
  document.getElementById('hTotal').textContent = '全服 47,832 人參與今日打卡';

  var pcts = [35, 20, 15, 30];
  setTimeout(function() {
    for (var i = 0; i < 4; i++) {
      document.getElementById('bar' + (i + 1)).style.width = pcts[i] + '%';
      document.getElementById('pct' + (i + 1)).textContent = pcts[i] + '%';
    }
  }, 300);
}

// ==================== Init ====================
window.addEventListener('load', function() {
  setTimeout(function() {
    var c = document.getElementById('qCanvas');
    if (c && c.parentElement) {
      var r = c.parentElement.getBoundingClientRect();
      c.width = r.width * devicePixelRatio;
      c.height = r.height * devicePixelRatio;
      c.style.width = r.width + 'px';
      c.style.height = r.height + 'px';
    }
  }, 100);
});
</script>
</body>
</html>
